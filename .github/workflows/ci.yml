name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  pre-commit:
    name: "pre commit"

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        with:
          persist-credentials: false

      - uses: j178/prek-action@91fd7d7cf70ae1dee9f4f44e7dfa5d1073fe6623 # v1.0.11

  shellcheck:
    name: "shellcheck"

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        with:
          persist-credentials: false

      - name: Run shellcheck
        run: shellcheck skills/typst-viewer/scripts/*.sh

  test-viewer-script:
    name: "test viewer script (${{ matrix.os }})"

    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    runs-on: ${{ matrix.os }}

    defaults:
      run:
        shell: bash

    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        with:
          persist-credentials: false

      - name: Test script syntax
        run: bash -n skills/typst-viewer/scripts/open-pdf.sh

      - name: Test missing file error
        run: |
          ! bash skills/typst-viewer/scripts/open-pdf.sh nonexistent.pdf 2>/dev/null

      - name: Test no args error
        run: |
          ! bash skills/typst-viewer/scripts/open-pdf.sh 2>/dev/null
